# Nome da aplicação
spring.application.name=OmniSync

# Servidor startar sozinho apos cada modificação
spring.devtools.restart.enabled=true

# Permite o redicionamento do Nginx
server.forward-headers-strategy=NATIVE

# Segredo do JWT (mínimo 32 chars se for HS256/HS512; aqui vou usar HS256 com chave forte)
app.jwt.secret=coloca-uma-chave-grande-aqui-com-mais-de-32-caracteres
app.jwt.accessExpMinutes=20
app.jwt.refreshExpDays=7

# Cookie
app.cookie.accessName=ACCESS_TOKEN
app.cookie.refreshName=REFRESH_TOKEN
app.cookie.secure=false

# Banco de dados Postgresql
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
logging.level.org.hibernate.orm.connections.pooling=WARN

spring.jpa.hibernate.ddl-auto=validate
app.crypto.secret=superStrongEncryptionKey
spring.jpa.open-in-view=false

# Mercado Livre
mercadolivre.client-id=${MELI_CLIENT_ID:}
mercadolivre.client-secret=${MELI_CLIENT_SECRET:}
mercadolivre.redirect-uri=${MELI_REDIRECT_URI:http://localhost:8080/api/integrations/mercadolivre/callback}
mercadolivre.oauth.state-secret=${MELI_STATE_SECRET:${app.crypto.secret}}
mercadolivre.oauth.state-ttl-seconds=${MELI_STATE_TTL_SECONDS:600}

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# RabbitTMQ
management.health.rabbit.enabled=false
